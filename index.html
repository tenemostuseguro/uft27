<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UFT - Editor de Alineación</title>
    <style>
      @font-face {
        font-family: "GRL";
        src: url("res://assets/fonts/grl.otf");
      }

      :root {
        --bg: #000d2d;
        --panel: #04102f;
        --text: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: radial-gradient(circle at top, #0a1e55 0%, var(--bg) 55%);
        color: var(--text);
      }

      .layout {
        padding: 16px;
      }

      .toolbar {
        display: flex;
        gap: 16px;
        align-items: center;
        margin-bottom: 10px;
        font-size: 30px;
      }

      .pitch {
        position: relative;
        width: 100%;
        max-width: 980px;
        aspect-ratio: 16 / 9;
        border: 2px solid rgba(255, 255, 255, 0.2);
        margin-bottom: 10px;
        background: radial-gradient(circle, #2d2f35 0%, #1f2025 60%, #16171b 100%);
      }

      .line {
        position: absolute;
        border: 1px solid rgba(255, 255, 255, 0.4);
      }

      .line.mid {
        top: 50%;
        width: 100%;
      }

      .line.circle {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .slot {
        position: absolute;
        width: 124px;
        height: 168px;
        transform: translate(-50%, -50%);
        border: 1px dashed rgba(255, 255, 255, 0.25);
        border-radius: 12px;
        display: grid;
        place-items: center;
      }

      .slot.drag-over {
        border-color: #6ec8ff;
        box-shadow: 0 0 0 2px rgba(110, 200, 255, 0.25);
      }

      .position {
        position: absolute;
        top: -26px;
        left: 0;
        font-size: 24px;
      }

      .collection {
        background: var(--panel);
        border-radius: 8px;
        padding: 10px;
        min-height: 170px;
        display: flex;
        gap: 10px;
        overflow-x: auto;
      }

      .card {
        position: relative;
        width: 124px;
        height: 168px;
        border-radius: 12px;
        overflow: hidden;
        flex: 0 0 auto;
        user-select: none;
        cursor: grab;
      }

      .card.dragging {
        opacity: 0.6;
        cursor: grabbing;
      }

      .card > img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .grl-badge {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 46px;
        height: 52px;
        display: grid;
        place-items: center;
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        color: #fff;
        font-family: "GRL", "Segoe UI", sans-serif;
        font-size: 17px;
        font-weight: 700;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      }

      .grl-amagrl {
        background-image: url("assets/amagrl.png");
      }

      .grl-rojgrl {
        background-image: url("assets/rojgrl.png");
      }

      .grl-morgrl {
        background-image: url("assets/morgrl.png");
      }

      .grl-blagrl {
        background-image: url("assets/blagrl.png");
      }

      .grl-fallback {
        clip-path: polygon(50% 0%, 96% 22%, 96% 77%, 50% 100%, 4% 77%, 4% 22%);
      }

      .grl-amagrl.grl-fallback { background: #a08d2b; }
      .grl-rojgrl.grl-fallback { background: #b01818; }
      .grl-morgrl.grl-fallback { background: #6d2a9f; }
      .grl-blagrl.grl-fallback { background: #111111; }

      h2 { margin: 8px 0; font-size: 32px; }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="toolbar">
        <strong>Rating 0 · Chemistry 100</strong>
        <label>Formación <select><option>1-2-1</option></select></label>
      </div>

      <div class="pitch" id="pitch">
        <div class="line mid"></div>
        <div class="line circle"></div>

        <div class="slot" data-slot="P" style="left:50%;top:16%;"><span class="position">P</span></div>
        <div class="slot" data-slot="AI" style="left:20%;top:40%;"><span class="position">AI</span></div>
        <div class="slot" data-slot="AD" style="left:80%;top:40%;"><span class="position">AD</span></div>
        <div class="slot" data-slot="C" style="left:50%;top:54%;"><span class="position">C</span></div>
        <div class="slot" data-slot="POR" style="left:50%;top:78%;"><span class="position">POR</span></div>
      </div>

      <h2>Mi colección UFT</h2>
      <div class="collection" id="collection"></div>
    </div>

    <template id="card-template">
      <article class="card" draggable="true">
        <img alt="Jugador" />
        <div class="grl-badge"></div>
      </article>
    </template>

    <script>
      const players = [
        { id: "p1", name: "Díaz", grl: 93, image: "https://picsum.photos/id/1027/248/336" },
        { id: "p2", name: "Soto", grl: 86, image: "https://picsum.photos/id/1005/248/336" },
        { id: "p3", name: "Mora", grl: 77, image: "https://picsum.photos/id/64/248/336" },
        { id: "p4", name: "Vega", grl: 104, image: "https://picsum.photos/id/433/248/336" }
      ];

      const collection = document.getElementById("collection");
      const template = document.getElementById("card-template");
      const slots = [...document.querySelectorAll(".slot")];
      let dragCard = null;

      function getBadgeClass(grl) {
        if (grl <= 79) return "grl-amagrl";
        if (grl >= 81 && grl <= 89) return "grl-rojgrl";
        if (grl >= 90 && grl <= 99) return "grl-morgrl";
        if (grl >= 100) return "grl-blagrl";
        return "grl-amagrl";
      }

      function createCard(player) {
        const node = template.content.firstElementChild.cloneNode(true);
        node.dataset.playerId = player.id;
        const image = node.querySelector("img");
        image.src = player.image;
        image.alt = player.name;

        const badge = node.querySelector(".grl-badge");
        const className = getBadgeClass(player.grl);
        badge.className = `grl-badge ${className}`;
        badge.textContent = player.grl;

        const probe = new Image();
        probe.onerror = () => badge.classList.add("grl-fallback");
        probe.src = getComputedStyle(badge).backgroundImage.replace(/^url\(["']?/, "").replace(/["']?\)$/, "");

        bindDrag(node);
        return node;
      }

      function bindDrag(card) {
        card.addEventListener("dragstart", (e) => {
          dragCard = card;
          card.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", card.dataset.playerId);
        });

        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          dragCard = null;
          slots.forEach((slot) => slot.classList.remove("drag-over"));
        });
      }

      function enableDropArea(area) {
        area.addEventListener("dragover", (e) => {
          if (!dragCard) return;
          e.preventDefault();
          area.classList.add("drag-over");
        });

        area.addEventListener("dragleave", () => area.classList.remove("drag-over"));

        area.addEventListener("drop", (e) => {
          e.preventDefault();
          area.classList.remove("drag-over");
          if (!dragCard) return;

          const existingCard = area.querySelector(".card");
          const originParent = dragCard.parentElement;

          if (existingCard && existingCard !== dragCard) {
            originParent.appendChild(existingCard);
          }

          area.appendChild(dragCard);
        });
      }

      players.forEach((p) => collection.appendChild(createCard(p)));
      slots.forEach(enableDropArea);
      enableDropArea(collection);
    </script>
  </body>
</html>
